<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #d3aec9cd; 
        }

        .login-box {
            width: 350px;
            margin: 100px auto;
            padding: 25px;
            background-color: #49181871; 
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
        }

        .form-control {
            margin-bottom: 10px;
        }

        .extra-links {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra-links a {
            color: #ffd6d6;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">

    
    <h1>Login Page</h1>

    
    <form onsubmit="authenticate(); return false;"> 
        
        <label> Username: </label>
        <input type="text" id="uname" class="form-control" placeholder="Enter Username" required>

        <label> Password: </label>
        <input type="password" id="pword" class="form-control" placeholder="Enter Password" required>

        
        <div class="form-check text-start">
            <input class="form-check-input" type="checkbox" id="stayLogged">
            <label class="form-check-label" for="stayLogged">
                Stay logged in
            </label>
        </div>

        <br>

        <input type="submit" value="Log In" class="btn btn-dark w-100">

    </form>

    
    <div class="extra-links">
        <p><a href="#">Forgot Username / Password?</a></p>
    </div>

</div>

<script> 


function authenticate(){

    
    var username = document.getElementById('uname').value;
    var password = document.getElementById('pword').value;
    var stayLogged = document.getElementById('stayLogged').checked; 

    var correctUser = "sapphire123";
    var correctPass = "1234";

    
    if(username === correctUser && password === correctPass){

        if(stayLogged){
            alert("Welcome " + username + "! (You chose to stay logged in)");
        } else {
            alert("Welcome " + username + "!");
        }

    }else{

        alert("Incorrect Username/Password");

    }
}

</script>
    
</body>
</html>
